version: '3.8'

services:
  benchmark:
    build: .
    container_name: anonimization-benchmark
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
    working_dir: /app
    networks:
      - benchmark_network
    command: ["python", "main.py"]
    extra_hosts:
       - "host.docker.internal:host-gateway"
networks:
  benchmark_network:
    driver: bridge
