[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --disable-warnings
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    unit: unit tests
    integration: integration tests
    e2e: end-to-end tests
    llm: tests related to LLM models
    slow: tests that take a long time to run
    label: tests related to label anonymization
    identify: tests related to identify anonymization
    substitute: tests related to substitute anonymization
    anthropic: tests related to Anthropic models
    openai: tests related to OpenAI models
    gemini: tests related to Gemini models
    deepseek: tests related to Deepseek models
    llama: tests related to Llama models
    mock: tests using mock providers
    aws: tests related to AWS provider
    azure: tests related to Azure provider
    local: tests related to local provider
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
minversion = 7.0